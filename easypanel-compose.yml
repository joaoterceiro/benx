# =====================================================================
# Benx - Stack de produção para EasyPanel (tipo de serviço: Compose)
# Serviços prefixados com "benx-" para conviver com outros no mesmo projeto.
# Cole no EasyPanel: projeto cartorio > + > Compose. Source = repo
# joaoterceiro/benx (branch main). Variáveis na aba "Environment".
#
# Domínios (aba "Domains"):
#   - benx-app   porta 3000  (ex.: www.seudominio.com.br)
#   - benx-minio porta 9000  (ex.: midia.seudominio.com.br)  [obrigatório p/ mídia]
# Depois aponte S3_PUBLIC_ENDPOINT para a URL pública do MinIO (midia.*).
# =====================================================================

services:
  benx-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://benx:${POSTGRES_PASSWORD:-trocar_senha_forte}@benx-postgres:5432/benx
      REDIS_URL: redis://benx-redis:6379
      # URL PÚBLICA do MinIO (o link da mídia é assinado com este host):
      S3_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://benx-minio:9000}
      S3_BUCKET: benx-midia
      S3_ACCESS_KEY: ${MINIO_USER:-benxminio}
      S3_SECRET_KEY: ${MINIO_PASSWORD:-trocar_senha_forte}
      S3_REGION: us-east-1
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@benx.com.br}
      ADMIN_SENHA: ${ADMIN_SENHA:-trocar_senha_forte}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-https://www.benx.com.br}
      # Rode o seed só no 1º deploy: defina RUN_SEED=true, suba, depois remova.
      RUN_SEED: ${RUN_SEED:-false}
    depends_on:
      benx-postgres:
        condition: service_healthy
      benx-redis:
        condition: service_healthy
      benx-minio:
        condition: service_healthy
    expose:
      - "3000"

  benx-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: benx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trocar_senha_forte}
      POSTGRES_DB: benx
    volumes:
      - benx-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U benx -d benx"]
      interval: 5s
      timeout: 5s
      retries: 10

  benx-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - benx-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  benx-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-benxminio}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-trocar_senha_forte}
    volumes:
      - benx-miniodata:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Cria o bucket público (download anônimo) no primeiro boot.
  benx-minio-init:
    image: minio/mc:latest
    depends_on:
      benx-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://benx-minio:9000 ${MINIO_USER:-benxminio} ${MINIO_PASSWORD:-trocar_senha_forte} &&
      mc mb --ignore-existing local/benx-midia &&
      mc anonymous set download local/benx-midia &&
      echo 'bucket benx-midia pronto'
      "

volumes:
  benx-pgdata:
  benx-redisdata:
  benx-miniodata:
